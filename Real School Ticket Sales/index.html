<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#0d6efd">
  <title>Real School Tickets</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-512.png">
  
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f8f9fa; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>

  <iframe 
    src="https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec" 
    allow="camera; microphone; fullscreen">
  </iframe>

  <script>
    // This registers the service worker, which tricks the phone into allowing installation
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
